name: demo-os-test

services:
  migrate-test:
    build:
      context: .
      dockerfile: packages/prisma/Dockerfile
    env_file:
      - .env.test
    environment:
      # Override host for Docker network
      DATABASE_URL: "postgresql://test_user:test_password@postgres-test:5432/drawn_lights_demo_test"
    networks:
      - test_network
    depends_on:
      postgres-test:
        condition: service_healthy

  postgres-test:
    image: postgres:16
    container_name: test_postgres
    environment:
      POSTGRES_DB: drawn_lights_demo_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    networks:
      - test_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d drawn_lights_demo_test"]
      interval: 5s
      timeout: 3s
      retries: 20
    tmpfs:
      # Use tmpfs for faster tests (data is not persisted)
      - /var/lib/postgresql/data

networks:
  test_network:
    name: demo_os_test

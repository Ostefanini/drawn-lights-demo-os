name: CI (Pull Request)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm -v
      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm -C packages/shared build
          pnpm -C packages/prisma build

      - name: Lint (workspace)
        run: pnpm lint

      - name: Type check (workspace)
        run: pnpm typecheck

      - name: Prisma generate
        run: pnpm --filter @drawn-lights-demo/prisma exec prisma generate --config prisma.config.ts
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db?schema=public"

      - name: Tests (workspace)
        run: pnpm test

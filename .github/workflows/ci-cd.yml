name: CI/CD (push main)

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ostefanini
  REPO: Drawn-lights-demo-os

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          #cache: pnpm
          #cache-dependency-path: pnpm-lock.yaml

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          #run_install: false

      - run: pnpm -v
      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm -C packages/shared build
          pnpm -C packages/prisma build

      - run: node -v
      - run: pnpm --filter web-react exec eslint -v

      - name: Lint (workspace)
        run: pnpm lint

      - name: Type check (workspace)
        run: pnpm typecheck

      - name: Prisma generate
        run: pnpm --filter @drawn-lights-demo/prisma exec prisma generate --config prisma.config.ts
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db?schema=public"

      - name: Tests (workspace)
        run: pnpm test

      - name: Generate coverage badges
        run: pnpm test:cov:badges

      - name: Commit coverage badges
        uses: EndBug/add-and-commit@v9
        with:
          add: "apps/*/badges"
          message: "chore: update coverage badges [skip ci]"
          default_author: github_actions
        continue-on-error: true

  build_and_push:
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: web-react
            dockerfile: apps/web-react/Dockerfile
            context: .
            target: runtime
          - name: api-expressjs
            dockerfile: apps/api-expressjs/Dockerfile
            context: .
            target: runtime
          - name: api-nestjs
            dockerfile: apps/api-nestjs/Dockerfile
            context: .
            target: runtime
          - name: prisma-migrate
            dockerfile: packages/prisma/Dockerfile
            context: .
            target: migrate
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to DHI
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.PERSONAL_DOCKER_USERNAME }}
          password: ${{ secrets.PERSONAL_DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          build-args: |
            DATABASE_URL="postgresql://user:pass@localhost:5432/db?schema=public"
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/${{ matrix.image.name }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/${{ matrix.image.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy (SSH -> docker compose)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: drawn-lights-demo.drawnlights.show
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull
            docker compose pull prisma-migrate web-react api-nestjs
            docker compose up -d web-react api-nestjs --remove-orphans
            docker image prune -f
